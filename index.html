<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner小助手 v8.0 - 終極修復版</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
        header { background: #d32f2f; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .nav-tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 8px; border-bottom: 1px solid #ddd; }
        .tab-btn { white-space: nowrap; padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #ff9800; color: white; border-color: #ff9800; }
        .container { max-width: 600px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .ball-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: radial-gradient(circle at 10px 10px, #fffde7, #ffd54f); box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .ball.sp { background: radial-gradient(circle at 10px 10px, #ffebee, #f44336); color: white; border: 1px solid #b71c1c; }
        #error-msg { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
    </style>
</head>
<body>

<header>Winner小助手 v8.0 - 修復版</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchGame('賓果賓果')">賓果賓果</button>
    <button class="tab-btn" onclick="switchGame('大樂透')">大樂透</button>
    <button class="tab-btn" onclick="switchGame('威力彩')">威力彩</button>
    <button class="tab-btn" onclick="switchGame('今彩539')">今彩539</button>
    <button class="tab-btn" onclick="switchGame('3星彩')">3星彩</button>
    <button class="tab-btn" onclick="switchGame('4星彩')">4星彩</button>
    <button class="tab-btn" onclick="switchGame('39樂合彩')">39樂合彩</button>
    <button class="tab-btn" onclick="switchGame('49樂合彩')">49樂合彩</button>
    <button class="tab-btn" onclick="switchGame('大樂透加開')">大樂透加開</button>
</div>

<div class="container">
    <div id="error-msg"></div>
    <div class="card">
        <h3 id="title" style="margin-top:0">賓果賓果</h3>
        <div id="list">載入中...</div>
    </div>
</div>

<script>
const CONFIG = {
    '賓果賓果': { file: '賓果賓果_2026.csv', balls: '開出號碼', sp: '超級獎號' },
    '大樂透': { file: '大樂透_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4','獎號5','獎號6'], sp: '特別號' },
    '威力彩': { file: '威力彩_2026.csv', balls: ['第一區1','第一區2','第一區3','第一區4','第一區5','第一區6'], sp: '第二區' },
    '今彩539': { file: '今彩539_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4','獎號5'], sp: null },
    '3星彩': { file: '3星彩_2026.csv', balls: ['獎號1','獎號2','獎號3'], sp: null },
    '4星彩': { file: '4星彩_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4'], sp: null },
    '39樂合彩': { file: '39樂合彩_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4','獎號5'], sp: null },
    '49樂合彩': { file: '49樂合彩_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4','獎號5','獎號6'], sp: null },
    '大樂透加開': { file: '大樂透加開獎項_2026.csv', balls: ['獎號1','獎號2','獎號3','獎號4','獎號5','獎號6'], sp: null }
};

let curGame = '賓果賓果';

window.onload = () => switchGame('賓果賓果');

async function switchGame(name) {
    curGame = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === name));
    document.getElementById('title').innerText = name;
    document.getElementById('error-msg').style.display = 'none';
    await loadData();
}

async function loadData() {
    const list = document.getElementById('list');
    list.innerHTML = '正在讀取資料夾內檔案...';

    try {
        // 💡 同時嘗試 lotto 與 Lotto 避免大小寫陷阱
        let fileName = encodeURIComponent(CONFIG[curGame].file);
        let res = await fetch(`./lotto/${fileName}`);
        
        if (!res.ok) {
            res = await fetch(`./Lotto/${fileName}`); // 備援路徑
        }
        
        if (!res.ok) throw new Error(`找不到檔案: ${CONFIG[curGame].file}`);
        
        const text = await res.text();
        const data = parseCSV(text);

        if (data.length === 0) {
            throw new Error(`檔案 ${CONFIG[curGame].file} 是空的 (只有標題沒有數據)`);
        }

        render(data);
    } catch (e) {
        document.getElementById('error-msg').innerText = `❌ 出錯了: ${e.message}`;
        document.getElementById('error-msg').style.display = 'block';
        list.innerHTML = '無資料內容';
    }
}

function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length <= 1) return [];
    
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).map(l => {
        let cells = [], inQ = false, cur = '';
        for (let char of l) {
            if (char === '"') inQ = !inQ;
            else if (char === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        cells.push(cur.trim());
        let o = {}; headers.forEach((h, i) => o[h] = cells[i]);
        return o;
    });
}

function render(data) {
    const list = document.getElementById('list');
    list.innerHTML = '';
    data.slice(0, 5).forEach(row => {
        const item = document.createElement('div');
        item.style.padding = '12px 0; border-bottom: 1px solid #eee';
        
        let balls = [];
        if (curGame === '賓果賓果') {
            balls = (row['開出號碼'] || '').split(/[ ,]+/).filter(n => n !== '');
        } else {
            const keys = Array.isArray(CONFIG[curGame].balls) ? CONFIG[curGame].balls : [CONFIG[curGame].balls];
            keys.forEach(k => { if(row[k]) balls.push(row[k]); });
        }

        let ballHtml = balls.map(n => `<div class="ball">${n.padStart(2,'0')}</div>`).join('');
        const spKey = CONFIG[curGame].sp;
        if (spKey && row[spKey]) {
            ballHtml += `<div class="ball sp">${row[spKey].padStart(2,'0')}</div>`;
        }

        item.innerHTML = `<strong>第 ${row.期數 || row.期別 || '未知'} 期</strong> <small>${row.日期 || row.開獎日期 || ''}</small><div class="ball-row">${ballHtml}</div>`;
        list.appendChild(item);
    });
}
</script>
</body>
</html>
